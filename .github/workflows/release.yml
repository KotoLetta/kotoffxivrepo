name: Release Plugins

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.plugin.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - name: GlamSpy
            project: GlamSpy/GlamSpy.csproj
          - name: OofsPlugin
            project: OofPlugin/OofPlugin.csproj

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudZip = Join-Path $env:RUNNER_TEMP "dalamud.zip"
          $dalamudDir = Join-Path $env:RUNNER_TEMP "dalamud"
          Invoke-WebRequest "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile $dalamudZip
          Expand-Archive -Path $dalamudZip -DestinationPath $dalamudDir -Force
          "DALAMUD_HOME=$dalamudDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore ${{ matrix.plugin.name }}
        run: dotnet restore ${{ matrix.plugin.project }} --locked-mode

      - name: Package ${{ matrix.plugin.name }}
        shell: pwsh
        run: ./.github/scripts/Package-Plugin.ps1 -PluginName "${{ matrix.plugin.name }}" -ProjectPath "${{ matrix.plugin.project }}" -OutputRoot "${{ github.workspace }}/artifacts"

      - name: Upload ${{ matrix.plugin.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.name }}
          path: artifacts/${{ matrix.plugin.name }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged plugins
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
